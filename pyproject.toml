# Workspace root for the embeddedci Python packages.
#
# This is NOT a buildable/publishable distribution — it only declares a uv
# workspace so the two real packages under packages/ resolve each other locally
# during development. Each package is built and published to PyPI independently
# (see packages/*/pyproject.toml and .github/workflows/publish.yml).
#
#   packages/embeddedci      — the BenchPod SDK + pytest plugin
#   packages/embeddedci-mcp  — the MCP server (thin consumer of embeddedci)

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
# Inside the workspace, embeddedci-mcp resolves embeddedci from the sibling
# source tree rather than PyPI.
embeddedci = { workspace = true }
