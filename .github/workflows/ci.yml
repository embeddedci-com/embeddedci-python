name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install both packages + test deps
        # embeddedci-mcp depends on embeddedci, so install the SDK first from
        # the sibling source tree, then the MCP server.
        run: |
          python -m pip install -e "packages/embeddedci[dev]"
          python -m pip install -e "packages/embeddedci-mcp[dev]"
      - name: Run tests
        # Hardware fixtures skip automatically without a BENCHPOD_CONNECTION,
        # so the suite stays green on runners without a pod attached.
        run: pytest -q packages/embeddedci packages/embeddedci-mcp

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [embeddedci, embeddedci-mcp]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build and check ${{ matrix.package }} distribution
        working-directory: packages/${{ matrix.package }}
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
